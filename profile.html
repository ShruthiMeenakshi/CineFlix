<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MoviesHere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-movieshere-dark text-white min-h-screen">
    <div class="max-w-3xl mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Profile</h1>
            <div>
                <button id="logoutBtn" class="bg-gray-700 px-3 py-1 rounded">Logout</button>
            </div>
        </div>
        <div id="profileCard" class="p-6 bg-black/60 rounded">
            <p>Loading...</p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        const token = localStorage.getItem('api_token');
        const profileCard = document.getElementById('profileCard');
        async function loadProfile() {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const res = await fetch(API_BASE + '/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) {
                    profileCard.innerHTML = '<p class="text-red-400">' + (data.error || 'Failed') + '</p>';
                    return;
                }
                profileCard.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="https://randomuser.me/api/portraits/men/32.jpg" class="w-20 h-20 rounded" />
                        <div>
                            <h2 class="text-xl font-bold">${data.displayName}</h2>
                            <p class="text-gray-300">${data.email}</p>
                        </div>
                    </div>
                    <div class="mt-6">
                        <p class="text-sm text-gray-300">Username: ${data.username}</p>
                    </div>
                `;
            } catch (err) {
                profileCard.innerHTML = '<p class="text-red-400">' + err.message + '</p>';
            }
        }
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            const t = localStorage.getItem('api_token');
            if (t) {
                await fetch(API_BASE + '/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + t } });
            }
            localStorage.removeItem('api_token');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        });
        loadProfile();
    </script>
</body>
</html>
