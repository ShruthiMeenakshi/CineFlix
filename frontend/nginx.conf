server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: serve index.html for unmatched routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets cache
  location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public";
  }
}
