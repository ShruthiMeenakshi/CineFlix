services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8082/api
        VITE_OMDB_API_KEY: 73370347
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
